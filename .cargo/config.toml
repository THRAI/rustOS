[build]
target = "riscv64gc-unknown-none-elf"

[target.riscv64gc-unknown-none-elf]
rustflags = [
    "-C", "link-arg=-Tkernel/linker/rv64-qemu.ld",
    "-C", "force-frame-pointers=yes",
    "-C", "target-feature=+zaamo,+zalrsc",
]

